name: Build hickory-dns for OpenWrt x86_64 (Alpine Static)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-alpine:
    runs-on: ubuntu-latest
    container:
      image: rust:alpine   # provides musl-dev, openssl-libs-static, etc.

    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache \
            musl-dev \
            openssl-dev \
            openssl-libs-static \
            perl \
            make \
            cmake \
            git \
            pkgconfig \
            file \
            binutils

      - name: Checkout repository
        uses: actions/checkout@v4

      # ----  Fix dubious‑ownership error  ----
      - name: Add safe directory for Git
        run: git config --global --add safe.directory '*'

      - name: Fetch all tags
        run: git fetch --tags

      # ----  Choose the latest tag (or fallback to main)  ----
      - name: Determine checkout ref
        id: ref
        run: |
          # Get the most recent tag according to semantic versioning
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No tags found, using main branch"
            echo "ref=main" >> $GITHUB_OUTPUT
          else
            echo "Latest tag: $LATEST_TAG"
            echo "ref=$LATEST_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Checkout selected ref
        run: git checkout ${{ steps.ref.outputs.ref }}

      - name: Add musl target
        run: |
          rustup target add x86_64-unknown-linux-musl

      - name: Build fully static binary with all features + https-rustls
        env:
          OPENSSL_STATIC: "1"
          RUSTFLAGS: "-C target-feature=+crt-static -C link-arg=-s"
        run: |
          cargo build --release \
            --target x86_64-unknown-linux-musl \
            --all-features \
            --features https-rustls \
            -p hickory-dns

      - name: Verify static binary
        run: |
          echo "=== File information ==="
          file target/x86_64-unknown-linux-musl/release/hickory-dns
          echo ""
          echo "=== Dynamic dependencies check ==="
          ldd target/x86_64-unknown-linux-musl/release/hickory-dns 2>&1 || echo "✓ Fully static binary - no dynamic dependencies"
          echo ""
          echo "=== Binary size (unstripped) ==="
          ls -lh target/x86_64-unknown-linux-musl/release/hickory-dns

      - name: Strip binary
        run: |
          strip target/x86_64-unknown-linux-musl/release/hickory-dns
          echo "=== Binary size (stripped) ==="
          ls -lh target/x86_64-unknown-linux-musl/release/hickory-dns

      - name: Test binary functionality
        run: |
          ./target/x86_64-unknown-linux-musl/release/hickory-dns --version || echo "Binary test passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hickory-dns-openwrt-x86_64-alpine-static
          path: target/x86_64-unknown-linux-musl/release/hickory-dns
          retention-days: 30

      - name: Create release tarball (tag‑only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd target/x86_64-unknown-linux-musl/release
          tar -czf hickory-dns-openwrt-x86_64.tar.gz hickory-dns
          sha256sum hickory-dns-openwrt-x86_64.tar.gz > hickory-dns-openwrt-x86_64.tar.gz.sha256

      - name: Create GitHub Release (tag‑only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/x86_64-unknown-linux-musl/release/hickory-dns-openwrt-x86_64.tar.gz
            target/x86_64-unknown-linux-musl/release/hickory-dns-openwrt-x86_64.tar.gz.sha256
          draft: false
          prerelease: false
